<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎁 Wishlist</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0A0A0A;
            --card-bg: #1C1C1E;
            --text: #FFFFFF;
            --text-secondary: #8E8E93;
            --accent: #5B2EFF;
            --accent-yellow: #FFD600;
            --accent-blue: #007AFF;
            --separator: #2C2C2E;
            --radius-card: 16px;
            --radius-btn: 24px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 16px 40px;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Header ===== */
        .header {
            padding: 28px 0 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
        }

        /* ===== Stats ===== */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            background: var(--card-bg);
            border-radius: var(--radius-card);
            padding: 14px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-number.yellow {
            color: var(--accent-yellow);
        }

        .stat-number.green {
            color: #34C759;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ===== Category Label ===== */
        .category-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 24px 0 12px 4px;
        }

        .category-label .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .dot.green { background: #34C759; }
        .dot.purple { background: var(--accent); }
        .dot.blue { background: #4FACFE; }

        /* ===== Gift Card ===== */
        .gift-card {
            background: var(--card-bg);
            border-radius: var(--radius-card);
            padding: 16px;
            margin-bottom: 12px;
            transition: opacity 0.3s ease;
            position: relative;
        }

        .gift-card.booked {
            opacity: 0.4;
        }

        .gift-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .gift-name {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.35;
            flex: 1;
        }

        .gift-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
        }

        .gift-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
        }

        .gift-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            transition: background 0.2s;
        }

        .gift-link:active {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ===== Buttons ===== */
        .btn-book {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: var(--accent-yellow);
            border: 1.5px solid var(--accent-yellow);
            border-radius: var(--radius-btn);
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-book:active {
            background: rgba(255, 214, 0, 0.1);
            transform: scale(0.97);
        }

        .btn-book:disabled {
            border-color: var(--separator);
            color: var(--text-secondary);
            cursor: default;
        }

        .btn-book.done {
            border-color: #34C759;
            color: #34C759;
            background: rgba(52, 199, 89, 0.08);
        }

        /* ===== Booked Badge ===== */
        .booked-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #34C759;
            margin-top: 10px;
        }

        .booked-badge::before {
            content: '✓';
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: #34C759;
            color: #fff;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 32px 0 16px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card-bg);
            border: 1px solid var(--separator);
            color: var(--text);
            padding: 12px 24px;
            border-radius: var(--radius-card);
            font-size: 14px;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== Confetti ===== */
        .confetti-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .confetti-piece {
            position: absolute;
            border-radius: 2px;
            animation: confetti-fall 2.2s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* ===== Empty state ===== */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎁 Wishlist</h1>
        <p>Выберите подарок и забронируйте анонимно</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="total-count">3</div>
            <div class="stat-label">Всего</div>
        </div>
        <div class="stat-card">
            <div class="stat-number yellow" id="available-count">3</div>
            <div class="stat-label">Доступно</div>
        </div>
        <div class="stat-card">
            <div class="stat-number green" id="booked-count">0</div>
            <div class="stat-label">Забронировано</div>
        </div>
    </div>

    <!-- До $50 -->
    <div class="category-label"><span class="dot green"></span>До $50</div>

    <div class="gift-card" data-id="water-filter">
        <div class="gift-card-top">
            <div class="gift-name">Фильтр обратного осмоса Stoewer A7</div>
            <div class="gift-price">$45</div>
        </div>
        <div class="gift-bottom">
            <a href="https://ozon.kz/product/filtr-obratnogo-osmosa-stoewer-a7-nabor-smennyh-kartridzhey-k3-3-sht-1586447237/" class="gift-link" target="_blank">🔗 Ozon.kz</a>
            <button class="btn-book" onclick="bookGift('water-filter')">🎁 Забронировать</button>
        </div>
    </div>

    <!-- $50 — $200 -->
    <div class="category-label"><span class="dot purple"></span>$50 — $200</div>

    <div class="gift-card" data-id="foot-massager">
        <div class="gift-card-top">
            <div class="gift-name">Массажер для ног электрический Foot Spa</div>
            <div class="gift-price">$120</div>
        </div>
        <div class="gift-bottom">
            <a href="https://ozon.kz/product/massazher-dlya-nog-i-beder-elektricheskiy-foot-spa-3-rezhima-massazha-s-podogrevom-puf-3165162282/" class="gift-link" target="_blank">🔗 Ozon.kz</a>
            <button class="btn-book" onclick="bookGift('foot-massager')">🎁 Забронировать</button>
        </div>
    </div>

    <!-- $500+ -->
    <div class="category-label"><span class="dot blue"></span>$500+</div>

    <div class="gift-card" data-id="bambu-h2s">
        <div class="gift-card-top">
            <div class="gift-name">Bambu Lab A1 mini — 3D принтер</div>
            <div class="gift-price">$599</div>
        </div>
        <div class="gift-bottom">
            <a href="https://bambulab.com/en/a1-mini" class="gift-link" target="_blank">🔗 Bambu Lab</a>
            <button class="btn-book" onclick="bookGift('bambu-h2s')">🎁 Забронировать</button>
        </div>
    </div>

    <div class="footer">
        Сделано с ❤️ Максом 🤖
    </div>

    <div class="toast" id="toast"></div>
    <div class="confetti-overlay" id="confetti"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Sync with Telegram theme
        try {
            tg.setHeaderColor('#0A0A0A');
            tg.setBackgroundColor('#0A0A0A');
        } catch(e) {}

        let bookedGifts = JSON.parse(localStorage.getItem('wishlist_booked') || '{}');

        document.addEventListener('DOMContentLoaded', updateUI);

        function updateUI() {
            let booked = 0;
            document.querySelectorAll('.gift-card').forEach(card => {
                const id = card.dataset.id;
                if (bookedGifts[id]) {
                    booked++;
                    card.classList.add('booked');

                    const btn = card.querySelector('.btn-book');
                    btn.innerHTML = '✓ Забронировано';
                    btn.disabled = true;
                    btn.classList.add('done');

                    if (!card.querySelector('.booked-badge')) {
                        const badge = document.createElement('div');
                        badge.className = 'booked-badge';
                        badge.textContent = 'Кто-то уже выбрал этот подарок';
                        card.appendChild(badge);
                    }
                }
            });

            const total = document.querySelectorAll('.gift-card').length;
            document.getElementById('total-count').textContent = total;
            document.getElementById('available-count').textContent = total - booked;
            document.getElementById('booked-count').textContent = booked;
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function fireConfetti() {
            const overlay = document.getElementById('confetti');
            const colors = ['#5B2EFF', '#FFD600', '#34C759', '#4FACFE', '#FF6B6B', '#FF9F43'];
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDelay = Math.random() * 0.4 + 's';
                p.style.width = (Math.random() * 7 + 4) + 'px';
                p.style.height = (Math.random() * 7 + 4) + 'px';
                overlay.appendChild(p);
            }
            setTimeout(() => overlay.innerHTML = '', 2500);
        }

        function bookGift(giftId) {
            if (bookedGifts[giftId]) {
                showToast('⚠️ Уже забронировано');
                return;
            }

            const userName = tg.initDataUnsafe?.user?.first_name || 'Аноним';

            tg.showConfirm('Забронировать этот подарок?', function(ok) {
                if (!ok) return;

                bookedGifts[giftId] = {
                    by: userName,
                    at: new Date().toISOString()
                };
                localStorage.setItem('wishlist_booked', JSON.stringify(bookedGifts));

                const title = document.querySelector(`[data-id="${giftId}"] .gift-name`).textContent;

                try {
                    tg.sendData(JSON.stringify({
                        action: 'gift_booked',
                        giftId, giftTitle: title, bookedBy: userName
                    }));
                } catch(e) {}

                fireConfetti();
                showToast('🎉 ' + title + ' — забронировано!');

                try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}

                updateUI();
            });
        }
    </script>
</body>
</html>
